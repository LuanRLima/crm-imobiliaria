services:
  db:
    image: postgres:16-alpine
    environment:
      # Valores de desenvolvimento local. Nunca reutilize em produção.
      POSTGRES_DB: ${POSTGRES_DB:-crm_imobiliaria}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm_imobiliaria"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_imobiliaria}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm123}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@crmimobiliaria.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
