name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Run migrations
        run: alembic upgrade head

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env:
      DATABASE_URL: sqlite:////tmp/crm-smoke-tests.db
      APP_ENV: test
      CORS_ORIGINS: http://127.0.0.1:4173
      SEED_ADMIN_EMAIL: admin@crmimobiliaria.local
      SEED_ADMIN_PASSWORD: changeme
      E2E_API_URL: http://127.0.0.1:8000/api/v1
      E2E_BASE_URL: http://127.0.0.1:4173
      E2E_HEALTH_URL: http://127.0.0.1:8000/health
      E2E_ADMIN_EMAIL: admin@crmimobiliaria.local
      E2E_ADMIN_PASSWORD: changeme

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Prepare backend database
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/crm-backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/crm-backend.log
          exit 1

      - name: Build frontend for smoke tests
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8000/api/v1
          VITE_BASE_PATH: /
        run: npm run build

      - name: Start frontend preview
        working-directory: frontend
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/crm-frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:4173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/crm-frontend.log
          exit 1

      - name: Run smoke tests
        working-directory: frontend
        run: npm run test:e2e

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend audit dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt pip-audit

      - name: Audit backend dependencies
        working-directory: backend
        run: pip-audit -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev
