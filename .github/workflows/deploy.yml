name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: "master - crm-imobiliaria-backend"
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Validate backend deploy hook
        env:
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          test -n "$RENDER_BACKEND_DEPLOY_HOOK" || {
            echo "::error::Missing RENDER_BACKEND_DEPLOY_HOOK. Configure it in Settings > Environments > master - crm-imobiliaria-backend > Secrets, or add it as a repository Actions secret."
            exit 1
          }

      - name: Trigger Render Backend Deploy
        run: |
          curl --fail-with-body --silent \
            -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

  deploy-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
      FRONTEND_API_URL: ${{ vars.FRONTEND_API_URL }}
      PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
      REPOSITORY_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend variables
        run: |
          test -n "$BACKEND_PUBLIC_URL" || {
            echo "Define the BACKEND_PUBLIC_URL variable in Settings > Secrets and variables > Actions."
            exit 1
          }

          test -n "$FRONTEND_API_URL" || {
            echo "Define the FRONTEND_API_URL variable in Settings > Secrets and variables > Actions."
            exit 1
          }

          if [ -n "$PAGES_BASE_PATH" ]; then
            if [ "${PAGES_BASE_PATH#"/"}" = "$PAGES_BASE_PATH" ]; then
              echo "PAGES_BASE_PATH must start with /."
              exit 1
            fi
            if [ "${PAGES_BASE_PATH%"/"}" = "$PAGES_BASE_PATH" ]; then
              echo "PAGES_BASE_PATH must end with /."
              exit 1
            fi
            if [ "$PAGES_BASE_PATH" = "/" ]; then
              echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            else
              echo "VITE_BASE_PATH=$PAGES_BASE_PATH" >> "$GITHUB_ENV"
            fi
          else
            echo "VITE_BASE_PATH=/$REPOSITORY_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.FRONTEND_API_URL }}
          VITE_BASE_PATH: ${{ env.VITE_BASE_PATH }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  publish-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  validate-deploy:
    name: Validate Deploy
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - publish-frontend
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
      FRONTEND_PUBLIC_URL: ${{ needs.publish-frontend.outputs.page_url }}
    steps:
      - name: Validate configured URLs
        run: |
          test -n "$BACKEND_PUBLIC_URL" || {
            echo "Define the BACKEND_PUBLIC_URL variable in Settings > Secrets and variables > Actions."
            exit 1
          }
          test -n "$FRONTEND_PUBLIC_URL" || {
            echo "GitHub Pages did not return a page URL."
            exit 1
          }

      - name: Wait for backend healthcheck
        run: |
          for attempt in $(seq 1 30); do
            if curl --silent --fail "$BACKEND_PUBLIC_URL/health" > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          curl --silent --show-error "$BACKEND_PUBLIC_URL/health"
          exit 1

      - name: Validate frontend website
        run: |
          curl --silent --show-error --fail "$FRONTEND_PUBLIC_URL" | grep -q "<title>CRM Imobiliária</title>"
