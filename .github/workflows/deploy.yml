name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Render Backend Deploy
        run: |
          curl --fail-with-body --silent \
            -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

  deploy-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      FRONTEND_API_URL: ${{ vars.FRONTEND_API_URL }}
      PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
      REPOSITORY_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend variables
        run: |
          test -n "$FRONTEND_API_URL" || {
            echo "Defina a variável FRONTEND_API_URL em Settings > Secrets and variables > Actions."
            exit 1
          }

          if [ -n "$PAGES_BASE_PATH" ]; then
            case "$PAGES_BASE_PATH" in
              /*/) ;;
              *)
                echo "PAGES_BASE_PATH deve começar e terminar com /."
                exit 1
                ;;
            esac
            echo "VITE_BASE_PATH=$PAGES_BASE_PATH" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/$REPOSITORY_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.FRONTEND_API_URL }}
          VITE_BASE_PATH: ${{ env.VITE_BASE_PATH }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  publish-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
